<div class="page">
  <div class="page-header">
    <h2 class="page-title">Clientes</h2>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>person_add</mat-icon>
      Novo Cliente
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>E-mail</th>
          <td mat-cell *matCellDef="let c">{{ c.email }}</td>
        </ng-container>
        <ng-container matColumnDef="phone">
          <th mat-header-cell *matHeaderCellDef>Telefone</th>
          <td mat-cell *matCellDef="let c">{{ c.phone }}</td>
        </ng-container>
        <ng-container matColumnDef="cpf">
          <th mat-header-cell *matHeaderCellDef>CPF</th>
          <td mat-cell *matCellDef="let c">{{ c.cpf }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let c">
            <mat-chip [class]="c.status === 'ACTIVE' ? 'chip-active' : 'chip-inactive'">
              {{ c.status === 'ACTIVE' ? 'Ativo' : 'Inativo' }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let c">
            <button mat-icon-button matTooltip="Editar" (click)="openEdit(c)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button [matTooltip]="c.status === 'ACTIVE' ? 'Desativar' : 'Ativar'" (click)="toggleStatus(c)">
              <mat-icon>{{ c.status === 'ACTIVE' ? 'block' : 'check_circle' }}</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      @if (dataSource.data.length === 0) {
        <p class="empty-message">Nenhum cliente cadastrado.</p>
      }
    </mat-card-content>
  </mat-card>
</div>
