<div class="page">
  <div class="page-header">
    <h2 class="page-title">Quadras</h2>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Nova Quadra
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="dataSource" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let c">{{ c.name }}</td>
        </ng-container>
        <ng-container matColumnDef="sportType">
          <th mat-header-cell *matHeaderCellDef>Esporte</th>
          <td mat-cell *matCellDef="let c">{{ c.sportType }}</td>
        </ng-container>
        <ng-container matColumnDef="pricePerHour">
          <th mat-header-cell *matHeaderCellDef>Preço/Hora</th>
          <td mat-cell *matCellDef="let c">{{ c.pricePerHour | currency:'BRL' }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let c">
            <mat-chip [class]="'chip-' + c.status.toLowerCase()">
              {{ statusLabel(c.status) }}
            </mat-chip>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Ações</th>
          <td mat-cell *matCellDef="let c">
            <button mat-icon-button matTooltip="Editar" (click)="openEdit(c)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button matTooltip="Alterar Status" [matMenuTriggerFor]="statusMenu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #statusMenu="matMenu">
              <button mat-menu-item (click)="changeStatus(c, 'ACTIVE')">
                <mat-icon>check_circle</mat-icon> Ativa
              </button>
              <button mat-menu-item (click)="changeStatus(c, 'INACTIVE')">
                <mat-icon>block</mat-icon> Inativa
              </button>
              <button mat-menu-item (click)="changeStatus(c, 'MAINTENANCE')">
                <mat-icon>build</mat-icon> Manutenção
              </button>
            </mat-menu>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
      @if (dataSource.data.length === 0) {
        <p class="empty-message">Nenhuma quadra cadastrada.</p>
      }
    </mat-card-content>
  </mat-card>
</div>
